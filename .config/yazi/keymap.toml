[mgr]
prepend_keymap = [
	{ on = ["c", "y"], run = ['shell --confirm "for path in %s; do echo \"file://$path\"; done | wl-copy -t text/uri-list"'], desc = "Copying into cliphist" },
    { on = ["u"], run = ['shell "udisksctl unmount -b $(findmnt -n -o SOURCE %1)"'], desc = "Unmount the selected drive"}
]

